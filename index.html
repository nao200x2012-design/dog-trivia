<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>犬のうんちく</title>

<style>

body{
margin:0;
padding:20px;
font-family:sans-serif;
background:#f2f2f2;
text-align:center;
}

.card{
max-width:850px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
font-size:42px;
}

img{
width:100%;
max-width:500px;
aspect-ratio:1/1;
object-fit:cover;
border-radius:20px;
margin-top:15px;
}

.title{
font-size:36px;
font-weight:bold;
margin-top:20px;
}

.text{
font-size:26px;
line-height:1.8;
margin-top:20px;
}

button{
font-size:26px;
padding:18px 30px;
margin-top:25px;
border:none;
border-radius:15px;
background:#4CAF50;
color:white;
cursor:pointer;
}

.audioBtn{
background:#03A9F4;
margin-left:10px;
}

.loading{
font-size:28px;
margin-top:40px;
}

</style>
</head>

<body>

<div class="card">

<h1>🐶 犬のうんちく</h1>

<div id="loading" class="loading">
読み込み中...
</div>

<img id="dogImage" src="">

<div class="title" id="title"></div>

<div class="text" id="text"></div>

<button onclick="loadTrivia()">
別のうんちく
</button>

<button class="audioBtn" onclick="playDogSound()">
🔊 ワン
</button>

<!-- 本物の犬の鳴き声 -->
<audio id="dogAudio" preload="auto">
<source src="dog.mp3" type="audio/mpeg">
</audio>

<!-- 癒しBGM -->
<audio id="bgm" loop preload="auto">
<source src="bgm.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQlZqF7nIBIcNiALO9tGg1cBL6eckZSZoyeiuM3RuQ4TWq5CDm5EdY9LbLgYJNBdK8GEVToMUS-rUFl/pub?gid=586931856&single=true&output=csv";

const dogImages = [

"https://placedog.net/500/500?id=1",
"https://placedog.net/500/500?id=2",
"https://placedog.net/500/500?id=3",
"https://placedog.net/500/500?id=4",
"https://placedog.net/500/500?id=5",
"https://placedog.net/500/500?id=6",
"https://placedog.net/500/500?id=7",
"https://placedog.net/500/500?id=8"

];

async function loadTrivia(){

document.getElementById("loading").style.display="block";

let res = await fetch(csvUrl);

let csv = await res.text();

let rows = csv.trim().split("\n").slice(1);

let data = rows.map(row => {

let cols = row.split(",");

return {

title: cols[0],

text: cols.slice(1).join(",")

};

});

let random = Math.floor(Math.random()*data.length);

document.getElementById("title").innerText =
data[random].title;

document.getElementById("text").innerText =
data[random].text;

let imgRandom =
Math.floor(Math.random()*dogImages.length);

document.getElementById("dogImage").src =
dogImages[imgRandom];

document.getElementById("loading").style.display="none";

}

function playDogSound(){

let dog = document.getElementById("dogAudio");

let bgm = document.getElementById("bgm");

dog.currentTime = 0;

dog.play();

bgm.volume = 0.05;

if(bgm.paused){

bgm.play();

}else{

bgm.pause();

}

}

loadTrivia();

</script>

</body>
</html>
