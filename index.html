<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>今日の犬うんちく</title>

<style>
body{
font-family:sans-serif;
text-align:center;
margin:40px;
}

.title{
font-size:24px;
font-weight:bold;
margin-top:20px;
}

.text{
max-width:700px;
margin:auto;
font-size:18px;
line-height:1.8;
margin-top:15px;
}

button{
font-size:18px;
padding:10px 20px;
margin-top:30px;
}
</style>

</head>

<body>

<h1>🐶 今日の犬うんちく</h1>

<div class="title" id="title"></div>
<div class="text" id="text"></div>

<button onclick="loadTrivia()">別のうんちく</button>

<script>

async function loadTrivia(){

let res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQlZqF7nIBIcNiALO9tGg1cBL6eckZSZoyeiuM3RuQ4TWq5CDm5EdY9LbLgYJNBdK8GEVToMUS-rUFl/pub?gid=586931856&single=true&output=csv");

let text = await res.text();

let rows = text.split("\n").slice(1);

let data = rows.map(r=>{
let c = r.split(",");
return {
title:c[0],
text:c[1]
};
});

let r = Math.floor(Math.random()*data.length);

document.getElementById("title").innerText = data[r].title;
document.getElementById("text").innerText = data[r].text;

}

loadTrivia();

</script>

</body>
</html>
