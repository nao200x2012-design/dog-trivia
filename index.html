<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>今日の犬うんちく</title>

<style>
body{
font-family:sans-serif;
text-align:center;
margin:40px;
}

.title{
font-size:24px;
font-weight:bold;
margin-top:20px;
}

.text{
max-width:700px;
margin:auto;
font-size:18px;
line-height:1.8;
margin-top:15px;
}

button{
font-size:18px;
padding:10px 20px;
margin-top:30px;
}
</style>

</head>

<body>

<h1>🐶 今日の犬うんちく</h1>

<div class="title" id="title"></div>
<div class="text" id="text"></div>

<button onclick="loadTrivia()">別のうんちく</button>

<script>

async function loadTrivia(){

let res = await fetch("ここにシートURL");

let data = await res.json();

let r = Math.floor(Math.random()*data.length);

document.getElementById("title").innerText = data[r].title;
document.getElementById("text").innerText = data[r].text;

}

loadTrivia();

</script>

</body>
</html>
